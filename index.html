<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loka Planner</title>
    
    <!-- PWA Setup -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#ffffff">
    <link rel="apple-touch-icon" href="./icon-192x192.png">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #ffffff; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        
        /* Animasi disederhanakan agar lebih ringan di HP */
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        .animate-in { animation: fade-in 200ms ease-out forwards; }
    </style>
</head>
<body class="text-slate-800 antialiased overflow-x-hidden">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.FB = {
            initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut,
            getFirestore, doc, setDoc, onSnapshot
        };
        window.dispatchEvent(new Event('firebase-modules-loaded'));
    </script>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        const createIcon = (phClasses) => ({ className, ...props }) => {
            let sizeClass = 'text-base';
            if (className?.includes('w-3.5')) sizeClass = 'text-[14px]';
            if (className?.includes('w-4')) sizeClass = 'text-[16px]';
            if (className?.includes('w-5')) sizeClass = 'text-[20px]';
            if (className?.includes('w-6')) sizeClass = 'text-[24px]';
            if (className?.includes('w-7')) sizeClass = 'text-[28px]';
            
            return <i className={`${phClasses} ${className || ''} ${sizeClass} leading-none`} style={{display: 'inline-flex', alignItems: 'center', justifyContent: 'center'}} {...props}></i>;
        };

        const Home = createIcon('ph-bold ph-house');
        const ListOrdered = createIcon('ph-bold ph-list-numbers');
        const Plus = createIcon('ph-bold ph-plus');
        const Wallet = createIcon('ph-bold ph-wallet');
        const ArrowUpRight = createIcon('ph-bold ph-arrow-up-right');
        const ArrowDownRight = createIcon('ph-bold ph-arrow-down-right');
        const CreditCard = createIcon('ph-bold ph-credit-card');
        const PieChart = createIcon('ph-bold ph-chart-pie');
        const Calendar = createIcon('ph-bold ph-calendar');
        const X = createIcon('ph-bold ph-x');
        const Target = createIcon('ph-bold ph-target');
        const Landmark = createIcon('ph-bold ph-bank');
        const PiggyBank = createIcon('ph-bold ph-piggy-bank');
        const AlertCircle = createIcon('ph-bold ph-warning-circle');
        const Receipt = createIcon('ph-bold ph-receipt');
        const Settings = createIcon('ph-bold ph-gear');
        const Trash2 = createIcon('ph-bold ph-trash');
        const PencilSimple = createIcon('ph-bold ph-pencil-simple');
        const ArrowLeft = createIcon('ph-bold ph-arrow-left');
        const ArrowUp = createIcon('ph-bold ph-arrow-up');
        const ArrowDown = createIcon('ph-bold ph-arrow-down');
        const Tags = createIcon('ph-bold ph-tag');
        const ChevronUp = createIcon('ph-bold ph-caret-up');
        const Eye = createIcon('ph-bold ph-eye');
        const EyeOff = createIcon('ph-bold ph-eye-closed');
        const Globe = createIcon('ph-bold ph-globe');
        const Coins = createIcon('ph-bold ph-coins');
        const Loader2 = createIcon('ph ph-spinner text-current');
        const CheckCircle2 = createIcon('ph-fill ph-check-circle');
        const User = createIcon('ph-bold ph-user');
        const Cloud = createIcon('ph-bold ph-cloud');
        const LogIn = createIcon('ph-bold ph-sign-in');
        const LogOut = createIcon('ph-bold ph-sign-out');
        const ArrowsLeftRight = createIcon('ph-bold ph-arrows-left-right');

        const INITIAL_CATEGORIES = {
            income: ['Gaji', 'Freelance', 'Income lainnya'],
            spending: ['Makan', 'Transport', 'Belanja', 'Lainnya'],
            bills: ['Sewa/Kost', 'Listrik/Air', 'Internet'],
            savings: ['Dana Darurat', 'Investasi'],
            debt: ['Cicilan Utang']
        };

        const UNITS = ['IDR', 'USD', 'SGD', 'EUR', 'AUD', 'JPY', 'Emas Antam (g)', 'Emas G24 (g)', 'Dinar KR', 'Saham (IDR)', 'Reksadana (IDR)', 'Kripto (IDR)', 'Obligasi (IDR)'];
        const INITIAL_RATES = {
            'IDR': 1, 'Saham (IDR)': 1, 'Reksadana (IDR)': 1, 'Kripto (IDR)': 1, 'Obligasi (IDR)': 1,
            'USD': 15500, 'SGD': 11800, 'EUR': 17000, 'AUD': 10500, 'JPY': 105,
            'Emas Antam (g)': 1400000, 'Emas G24 (g)': 1395000, 'Dinar KR': 4500000
        };

        const triggerHaptic = (duration = 10) => {
            if (typeof navigator !== 'undefined' && navigator.vibrate) { try { navigator.vibrate(duration); } catch (e) {} }
        };

        // ==========================================
        // FIREBASE SETUP (MASUKKAN KONFIGURASI ANDA DI SINI)
        // ==========================================
        let app, auth, db, appId;
        const initFirebase = () => {
            const MY_FIREBASE_CONFIG = {
                apiKey: "AIzaSyDRbntP1nEpvFgYViRRA0UDQ22v7rCRp4Y",
                authDomain: "lokaplanner-finance.firebaseapp.com",
                projectId: "lokaplanner-finance",
                storageBucket: "lokaplanner-finance.firebasestorage.app",
                messagingSenderId: "1045492224881",
                appId: "1:1045492224881:web:8790f7c1b48c8371e1dcd0",
                measurementId: "G-H3FBSF7WDD"
            };
            const firebaseConfig = typeof window.__firebase_config !== 'undefined' && window.__firebase_config ? JSON.parse(window.__firebase_config) : MY_FIREBASE_CONFIG;
            
            app = window.FB.initializeApp(firebaseConfig);
            auth = window.FB.getAuth(app);
            db = window.FB.getFirestore(app);
            appId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'default-app-id';
        };

        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [plannerTab, setPlannerTab] = useState('budget');
            const [profileTab, setProfileTab] = useState('networth');
            const [isAddModalOpen, setIsAddModalOpen] = useState(false);

            const [user, setUser] = useState(null);
            const [cloudSyncStatus, setCloudSyncStatus] = useState('Menghubungkan...');
            const [privacyMode, setPrivacyMode] = useState(false);
            
            // Logika Kunci Sinkronisasi (Mencegah Loop/Data Kosong)
            const isDataLoadedRef = useRef(false);
            const isReceivingDataRef = useRef(false); // Flag agar save tidak tertabrak fetch

            const [rates, setRates] = useState(INITIAL_RATES);
            const [selectedMonth, setSelectedMonth] = useState(new Date().getMonth() + 1);
            const [selectedYear, setSelectedYear] = useState(new Date().getFullYear());

            const [transactions, setTransactions] = useState([]); 
            const [categories, setCategories] = useState(INITIAL_CATEGORIES);
            const [budgets, setBudgets] = useState({});
            const [goals, setGoals] = useState([]);
            const [debts, setDebts] = useState([]);
            const [assets, setAssets] = useState([]);

            // State UI Modal/Form (Minimalist Form)
            const [isAddingBudget, setIsAddingBudget] = useState(false);
            const [isAddingAsset, setIsAddingAsset] = useState(false);
            const [isAddingDebt, setIsAddingDebt] = useState(false);
            const [isAddingGoal, setIsAddingGoal] = useState(false);
            const [isAddingCategory, setIsAddingCategory] = useState(false);
            const [isFetchingRates, setIsFetchingRates] = useState(false);
            
            const [newBudgetCat, setNewBudgetCat] = useState('');
            const [newBudgetLimit, setNewBudgetLimit] = useState('');
            const [newAsset, setNewAsset] = useState({ name: '', category: 'Bank Cash', unit: 'IDR', quantity: '' });
            const [newDebt, setNewDebt] = useState({ name: '', total: '', type: 'debt' });
            const [newGoalName, setNewGoalName] = useState('');
            const [newGoalTarget, setNewGoalTarget] = useState('');
            const [newCatType, setNewCatType] = useState('spending');
            const [newCatName, setNewCatName] = useState('');
            
            const [editingTx, setEditingTx] = useState(null);
            const [viewingDebtId, setViewingDebtId] = useState(null);
            const [editingBudget, setEditingBudget] = useState(null);
            const [tempBudgetLimit, setTempBudgetLimit] = useState('');
            
            // State untuk Edit Dompet/Aset
            const [editingAssetId, setEditingAssetId] = useState(null);
            const [tempAsset, setTempAsset] = useState({ name: '', quantity: '' });

            const [viewingGoalId, setViewingGoalId] = useState(null);
            const [isDebtTxModalOpen, setIsDebtTxModalOpen] = useState(false);
            const [debtTxForm, setDebtTxForm] = useState({ type: 'payment', amount: '', date: new Date().toISOString().split('T')[0], note: '', sync: false, walletId: '' });

            // 1. AUTHENTICATION
            useEffect(() => {
                if (!auth) return;
                const initializeAuth = async () => {
                    try {
                        if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
                            await window.FB.signInWithCustomToken(auth, window.__initial_auth_token);
                        } else {
                            await window.FB.signInAnonymously(auth);
                        }
                    } catch (error) { 
                        console.error("Auth Init Error:", error);
                        setCloudSyncStatus('Lokal (Auth Error)'); 
                    }
                };
                initializeAuth();

                const unsubscribe = window.FB.onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                    if (currentUser) setCloudSyncStatus(currentUser.isAnonymous ? 'Mode Lokal / Anonim' : 'Tersinkronisasi');
                });
                return () => unsubscribe();
            }, []);

            // 2. FETCH DATA DARI CLOUD (REAL-TIME)
            useEffect(() => {
                if (!user || !db) return;
                const docRef = window.FB.doc(db, 'artifacts', appId, 'users', user.uid, 'appData', 'state');
                
                const unsubscribe = window.FB.onSnapshot(docRef, (docSnap) => {
                    if (docSnap.metadata.hasPendingWrites) return; // Abaikan perubahan dari diri sendiri

                    if (docSnap.exists()) {
                        isReceivingDataRef.current = true; // KUNCI: Jangan auto-save selama update state dari cloud
                        const data = docSnap.data();
                        
                        if (data.transactions) setTransactions(data.transactions);
                        if (data.categories) setCategories(data.categories);
                        if (data.budgets) setBudgets(data.budgets);
                        if (data.goals) setGoals(data.goals);
                        if (data.debts) setDebts(data.debts);
                        if (data.assets) setAssets(data.assets);
                        if (data.rates) setRates(data.rates);
                        
                        setCloudSyncStatus('Tersinkronisasi');
                        isDataLoadedRef.current = true;

                        // Lepaskan kunci setelah React selesai merender state
                        setTimeout(() => { isReceivingDataRef.current = false; }, 500);
                    } else {
                        isDataLoadedRef.current = true;
                    }
                }, () => { setCloudSyncStatus('Offline'); });

                return () => unsubscribe();
            }, [user]);

            // 3. AUTO-SAVE DATA KE CLOUD
            useEffect(() => {
                // KUNCI: Jangan save jika data belum di-load ATAU sedang menerima data dari server
                if (!user || !db || !isDataLoadedRef.current || isReceivingDataRef.current) return;

                const timer = setTimeout(async () => {
                    setCloudSyncStatus('Menyimpan...');
                    try {
                        const docRef = window.FB.doc(db, 'artifacts', appId, 'users', user.uid, 'appData', 'state');
                        await window.FB.setDoc(docRef, { transactions, categories, budgets, goals, debts, assets, rates }, { merge: true });
                        setCloudSyncStatus('Tersinkronisasi');
                    } catch (error) {
                        setCloudSyncStatus('Gagal Simpan');
                    }
                }, 1000); // Debounce 1 detik untuk performa
                
                return () => clearTimeout(timer);
            }, [transactions, categories, budgets, goals, debts, assets, rates, user]);

            const handleGoogleLogin = async () => {
                if (!auth || !window.FB) return;
                const provider = new window.FB.GoogleAuthProvider();
                provider.setCustomParameters({ prompt: 'select_account' });
                try {
                    setCloudSyncStatus('Memproses Login...');
                    isDataLoadedRef.current = false; // Reset status load
                    await window.FB.signInWithPopup(auth, provider);
                } catch (err) { 
                    console.error("Login Error:", err);
                    isDataLoadedRef.current = true; // Buka kembali kunci
                    // Memberikan pesan error yang jelas kepada pengguna
                    if (err.code === 'auth/popup-blocked') {
                        setCloudSyncStatus('Gagal: Popup diblokir browser.');
                    } else if (err.code === 'auth/unauthorized-domain') {
                        setCloudSyncStatus('Gagal: Domain belum diizinkan.');
                    } else if (err.code === 'auth/invalid-api-key') {
                        setCloudSyncStatus('Gagal: API Key Salah/Kosong.');
                    } else {
                        setCloudSyncStatus('Gagal: ' + (err.code || 'Silakan coba lagi'));
                    }
                }
            };

            const handleLogout = async () => {
                if (!auth || !window.FB) return;
                setUser(null); setTransactions([]); setAssets([]); setBudgets({}); setGoals([]); setDebts([]);
                try {
                    await window.FB.signOut(auth);
                    await window.FB.signInAnonymously(auth);
                } catch (err) {}
            };

            const fetchLiveRates = async () => {
                setIsFetchingRates(true);
                try {
                    const res = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
                    const data = await res.json();
                    const idrRate = data.rates.IDR;
                    setRates(prev => ({
                        ...prev, USD: idrRate, SGD: idrRate / data.rates.SGD, EUR: idrRate / data.rates.EUR, AUD: idrRate / data.rates.AUD, JPY: idrRate / data.rates.JPY,
                    }));
                } catch (err) {} finally { setIsFetchingRates(false); }
            };

            const handleRateChange = (key, value) => {
                const numVal = parseInt(value.replace(/\D/g, ''), 10) || 0;
                setRates(prev => ({ ...prev, [key]: numVal }));
            };

            // Format Uang Minimalist
            const displayMoney = (val) => {
                if (privacyMode) return 'Rp •••••••';
                if (!val) return 'Rp 0';
                return 'Rp ' + val.toLocaleString('id-ID');
            };

            const getAssetValueInIDR = (asset) => {
                const qty = Number(asset.quantity !== undefined ? asset.quantity : (asset.amount || 0));
                if (!asset.unit || asset.unit === 'IDR') return qty;
                return qty * (Number(rates[asset.unit]) || 1);
            };

            // Kalkulasi Filter
            const filteredTransactions = useMemo(() => {
                return (transactions || []).filter(t => {
                    if (selectedMonth === 'all' && selectedYear === 'all') return true;
                    const tDate = new Date(t.date);
                    return (selectedMonth === 'all' || (tDate.getMonth() + 1) === parseInt(selectedMonth)) &&
                           (selectedYear === 'all' || tDate.getFullYear() === parseInt(selectedYear));
                }).sort((a, b) => new Date(b.date) - new Date(a.date));
            }, [transactions, selectedMonth, selectedYear]);

            const summary = useMemo(() => {
                let inc = 0, exp = 0, sav = 0, debt = 0;
                filteredTransactions.forEach(t => {
                    if (t.type === 'income') inc += t.amount;
                    else if (t.type === 'spending' || t.type === 'bills') exp += t.amount;
                    else if (t.type === 'savings') sav += t.amount;
                    else if (t.type === 'debt') debt += t.amount;
                });
                return { balance: inc - exp - sav - debt, income: inc, expense: exp, savings: sav, debtPaid: debt };
            }, [filteredTransactions]);

            const totalNetWorth = useMemo(() => {
                // Total dari sub-aset Tabungan (Goals)
                const totalGoals = goals.reduce((s, g) => s + (g.assets || []).reduce((as, a) => as + getAssetValueInIDR(a), 0), 0);
                
                // Total dari Hutang dan Piutang (Debts)
                let netDebtReceivable = 0;
                debts.forEach(d => {
                    const sisa = (Number(d.total) || 0) - (Number(d.paid) || 0);
                    if (d.type === 'debt') {
                        netDebtReceivable -= sisa; // Hutang mengurangi kekayaan
                    } else if (d.type === 'receivable') {
                        netDebtReceivable += sisa; // Piutang menambah kekayaan
                    }
                });

                // Kekayaan bersih HANYA dari Tabungan dan Hutang/Piutang
                return totalGoals + netDebtReceivable;
            }, [goals, debts, rates]);

            const handleTabChange = (tabName) => { triggerHaptic(10); setActiveTab(tabName); window.scrollTo(0,0); };
            const handlePlannerTabChange = (tabName) => { triggerHaptic(10); setPlannerTab(tabName); };
            const handleProfileTabChange = (tabName) => { triggerHaptic(10); setProfileTab(tabName); };

            const toggleGoalCollapse = (goalId) => { triggerHaptic(10); setGoals(goals.map(g => g.id === goalId ? { ...g, collapsed: !g.collapsed } : g)); };
            const updateGoal = (goalId, field, value) => setGoals(goals.map(g => g.id === goalId ? { ...g, [field]: value } : g));
            const addGoalAsset = (goalId) => { triggerHaptic(10); setGoals(goals.map(g => g.id !== goalId ? g : { ...g, assets: [...(g.assets || []), { id: Date.now(), name: '', unit: 'IDR', quantity: '' }] })); };
            const updateGoalAsset = (goalId, assetId, field, value) => {
                setGoals(goals.map(g => {
                    if (g.id !== goalId) return g;
                    return { ...g, assets: (g.assets || []).map(a => {
                        if (a.id !== assetId) return a;
                        return { ...a, [field]: value };
                    })};
                }));
            };
            const removeGoalAsset = (goalId, assetId) => { triggerHaptic(10); setGoals(goals.map(g => g.id !== goalId ? g : { ...g, assets: (g.assets || []).filter(a => a.id !== assetId) })); };

            // ==========================================
            // VIEWS (DIBUAT RINGAN & MINIMALIS)
            // ==========================================
            const renderDashboard = () => (
                <div className="space-y-4 animate-in">
                    {/* Minimalist Top Card */}
                    <div className="bg-slate-900 text-white p-5 rounded-2xl">
                        <div className="flex justify-between items-start mb-1">
                            <p className="text-xs font-medium text-slate-400">Sisa Saldo Bulan Ini</p>
                            <button onClick={() => setPrivacyMode(!privacyMode)} className="text-slate-400 p-1">
                                {privacyMode ? <EyeOff className="w-4 h-4" /> : <Eye className="w-4 h-4" />}
                            </button>
                        </div>
                        <h3 className="text-3xl font-black mb-4 tracking-tight">{displayMoney(summary.balance)}</h3>
                        
                        <div className="flex gap-4 pt-3 border-t border-slate-700/50">
                            <div><p className="text-[10px] text-slate-400">Pemasukan</p><p className="text-sm font-bold text-emerald-400">{displayMoney(summary.income)}</p></div>
                            <div><p className="text-[10px] text-slate-400">Pengeluaran</p><p className="text-sm font-bold text-rose-400">{displayMoney(summary.expense)}</p></div>
                        </div>
                    </div>

                    {/* Quick Action & Recents */}
                    <div className="flex justify-between items-center px-1">
                        <h3 className="text-sm font-bold text-slate-800">Transaksi Terakhir</h3>
                        <button onClick={() => handleTabChange('transactions')} className="text-xs font-bold text-emerald-600">Lihat Semua</button>
                    </div>

                    <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                        {filteredTransactions.length > 0 ? filteredTransactions.slice(0, 4).map((t, idx) => (
                            <div key={t.id} className={`flex justify-between items-center p-3.5 ${idx !== 0 ? 'border-t border-slate-50' : ''}`}>
                                <div className="flex items-center gap-3">
                                    <div className={`p-2 rounded-lg ${t.type === 'income' ? 'bg-emerald-50 text-emerald-600' : t.type === 'transfer' ? 'bg-blue-50 text-blue-600' : 'bg-slate-50 text-slate-600'}`}>
                                        {t.type === 'income' ? <ArrowDownRight className="w-4 h-4" /> : t.type === 'transfer' ? <ArrowsLeftRight className="w-4 h-4" /> : <ArrowUpRight className="w-4 h-4" />}
                                    </div>
                                    <div>
                                        <p className="font-bold text-slate-800 text-sm leading-tight">{t.description}</p>
                                        <p className="text-[10px] font-medium text-slate-400">{t.category} • {new Date(t.date).toLocaleDateString('id-ID', {day:'numeric', month:'short'})}</p>
                                    </div>
                                </div>
                                <span className={`font-black text-sm ${t.type === 'income' ? 'text-emerald-600' : t.type === 'transfer' ? 'text-blue-600' : 'text-slate-800'}`}>
                                    {t.type === 'income' ? '+' : t.type === 'transfer' ? '' : '-'}{displayMoney(t.amount)}
                                </span>
                            </div>
                        )) : (
                            <p className="text-center text-xs text-slate-400 py-6">Belum ada transaksi</p>
                        )}
                    </div>
                </div>
            );

            const renderTransactions = () => (
                <div className="bg-white rounded-2xl shadow-sm border border-slate-100 animate-in">
                    {filteredTransactions.map((t, idx) => (
                        <div key={t.id} className={`flex justify-between items-center p-4 ${idx !== 0 ? 'border-t border-slate-50' : ''}`}>
                            <div className="flex-1 min-w-0 pr-3">
                                <p className="font-bold text-slate-800 text-sm truncate">{t.description}</p>
                                <div className="flex gap-2 items-center mt-0.5">
                                    <span className="text-[10px] font-medium text-slate-400">{t.date}</span>
                                    <span className="text-[10px] font-bold px-1.5 py-0.5 bg-slate-50 rounded text-slate-500">{t.category}</span>
                                </div>
                            </div>
                            <div className="flex items-center gap-3 shrink-0">
                                <span className={`font-black text-sm ${t.type === 'income' ? 'text-emerald-600' : t.type === 'transfer' ? 'text-blue-600' : 'text-slate-800'}`}>
                                    {t.type === 'income' ? '+' : t.type === 'transfer' ? '' : '-'}{displayMoney(t.amount)}
                                </span>
                                <div className="flex gap-1">
                                    <button onClick={() => { setEditingTx(t); setIsAddModalOpen(true); }} className="text-slate-400 p-1"><PencilSimple className="w-4 h-4" /></button>
                                    <button onClick={() => setTransactions(prev => prev.filter(tx => tx.id !== t.id))} className="text-rose-400 p-1"><Trash2 className="w-4 h-4" /></button>
                                </div>
                            </div>
                        </div>
                    ))}
                    {filteredTransactions.length === 0 && <p className="text-center text-sm text-slate-400 py-10">Data kosong</p>}
                </div>
            );

            const renderPlanner = () => (
                <div className="space-y-4 animate-in">
                    <div className="flex bg-slate-100 p-1 rounded-xl w-full">
                        <button onClick={() => setPlannerTab('budget')} className={`flex-1 py-2 text-xs font-bold rounded-lg transition-colors ${plannerTab === 'budget' ? 'bg-white shadow-sm text-slate-800' : 'text-slate-500'}`}>Budget Bulanan</button>
                        <button onClick={() => setPlannerTab('goals')} className={`flex-1 py-2 text-xs font-bold rounded-lg transition-colors ${plannerTab === 'goals' ? 'bg-white shadow-sm text-slate-800' : 'text-slate-500'}`}>Hutang & Tujuan</button>
                    </div>

                    {plannerTab === 'budget' && (
                        <div className="space-y-5">
                            {Object.entries(budgets).map(([cat, limit]) => {
                                const spent = (transactions || []).filter(t => t.category === cat && t.type !== 'income' && t.type !== 'transfer').reduce((s, t) => s + t.amount, 0);
                                const percentage = Math.min(100, (spent / limit) * 100);
                                return (
                                    <div key={cat} className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                                        <div className="flex justify-between items-center mb-2">
                                            <span className="font-bold text-sm text-slate-800">{cat}</span>
                                            <div className="flex gap-1.5">
                                                <button onClick={() => { setEditingBudget(cat); setTempBudgetLimit(String(limit)); }} className="text-slate-400 hover:text-indigo-500 p-1"><PencilSimple className="w-3.5 h-3.5"/></button>
                                                <button onClick={() => { const b = {...budgets}; delete b[cat]; setBudgets(b); }} className="text-slate-400 hover:text-rose-500 p-1"><Trash2 className="w-3.5 h-3.5"/></button>
                                            </div>
                                        </div>
                                        {editingBudget === cat ? (
                                            <div className="flex gap-2 items-center mt-2 mb-1">
                                                <input type="text" inputMode="numeric" className="flex-1 p-2 bg-slate-50 border border-slate-200 rounded-lg text-xs font-bold outline-none focus:border-indigo-400" value={tempBudgetLimit ? Number(tempBudgetLimit).toLocaleString('id-ID') : ''} onChange={e => setTempBudgetLimit(e.target.value.replace(/\D/g, ''))} />
                                                <button onClick={() => { if(tempBudgetLimit) { setBudgets({...budgets, [cat]: Number(tempBudgetLimit)}); setEditingBudget(null); } }} className="px-3 py-2 bg-emerald-500 text-white rounded-lg text-xs font-bold">Simpan</button>
                                            </div>
                                        ) : (
                                            <>
                                                <div className="flex justify-between text-xs mb-1.5">
                                                    <span className="font-bold text-slate-600">{displayMoney(spent)}</span>
                                                    <span className="text-slate-400">/ {displayMoney(limit)}</span>
                                                </div>
                                                <div className="w-full bg-slate-50 rounded-full h-2">
                                                    <div className={`h-full rounded-full ${percentage > 85 ? 'bg-rose-500' : 'bg-emerald-500'}`} style={{ width: `${percentage}%` }}></div>
                                                </div>
                                            </>
                                        )}
                                    </div>
                                );
                            })}
                            
                            {!isAddingBudget ? (
                                <button onClick={() => setIsAddingBudget(true)} className="w-full py-3 bg-emerald-50 text-emerald-600 rounded-xl font-bold text-sm flex items-center justify-center gap-2">
                                    <Plus className="w-4 h-4"/> Tambah Limit Budgeting Baru
                                </button>
                            ) : (
                                <div className="bg-slate-50 p-4 rounded-2xl border border-slate-200 flex flex-col gap-3">
                                    <select className="p-3 bg-white border border-slate-200 rounded-xl text-sm font-bold w-full" value={newBudgetCat} onChange={e => setNewBudgetCat(e.target.value)}>
                                        <option value="">Pilih Kategori</option>
                                        {[...categories.spending, ...categories.bills, ...categories.savings].map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                    <input type="text" inputMode="numeric" placeholder="Nominal Budget Limit" className="p-3 bg-white border border-slate-200 rounded-xl text-sm font-bold w-full" value={newBudgetLimit ? Number(newBudgetLimit).toLocaleString('id-ID') : ''} onChange={e => setNewBudgetLimit(e.target.value.replace(/\D/g, ''))} />
                                    <div className="flex gap-2">
                                        <button onClick={() => { if(newBudgetCat && newBudgetLimit) { setBudgets({...budgets, [newBudgetCat]: Number(newBudgetLimit)}); setIsAddingBudget(false); setNewBudgetCat(''); setNewBudgetLimit(''); }}} className="flex-1 bg-emerald-600 text-white rounded-xl py-2.5 font-bold text-sm">Simpan</button>
                                        <button onClick={() => setIsAddingBudget(false)} className="flex-1 bg-slate-200 text-slate-700 rounded-xl py-2.5 font-bold text-sm">Batal</button>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {plannerTab === 'goals' && (
                        <div className="space-y-6">
                            {/* Tabungan Minimalist */}
                            <div>
                                <h4 className="text-xs font-bold text-slate-500 uppercase mb-3">Target Tabungan (Sub-Aset)</h4>
                                <div className="space-y-3">
                                    {goals.map(goal => {
                                        const goalTotal = (goal.assets || []).reduce((sum, a) => sum + getAssetValueInIDR(a), 0);
                                        const percentage = Math.min(100, goal.target > 0 ? (goalTotal / goal.target) * 100 : 0);

                                        return (
                                            <div key={goal.id} className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                                                <div className="flex justify-between items-start mb-3">
                                                    <div className="flex-1">
                                                        <p className="font-bold text-sm text-slate-800">{goal.name}</p>
                                                        <div className="flex items-center gap-1 mt-1 text-[10px] text-slate-500">
                                                            <span className="font-bold text-emerald-500">{displayMoney(goalTotal)}</span>
                                                            <span>/ {displayMoney(goal.target)}</span>
                                                        </div>
                                                    </div>
                                                    <div className="flex gap-2">
                                                        <button onClick={() => setViewingGoalId(goal.id)} className="px-3 py-1.5 bg-slate-50 text-slate-600 rounded-lg text-xs font-bold border border-slate-100">Detail</button>
                                                        <button onClick={() => setGoals(goals.filter(g => g.id !== goal.id))} className="px-2 py-1.5 bg-rose-50 text-rose-500 rounded-lg"><Trash2 className="w-3.5 h-3.5"/></button>
                                                    </div>
                                                </div>
                                                <div className="w-full bg-slate-50 rounded-full h-1.5">
                                                    <div className={`h-full rounded-full transition-all ${percentage >= 100 ? 'bg-emerald-500' : 'bg-indigo-500'}`} style={{ width: `${percentage}%` }}></div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                                
                                {!isAddingGoal ? (
                                    <button onClick={() => setIsAddingGoal(true)} className="w-full mt-3 py-3 bg-white border border-dashed border-slate-300 text-slate-600 rounded-xl font-bold text-sm flex items-center justify-center gap-2 hover:bg-slate-50 transition">
                                        <Plus className="w-4 h-4"/> Tambah Tujuan Tabungan
                                    </button>
                                ) : (
                                    <div className="mt-3 bg-slate-50 p-4 rounded-2xl border border-slate-200 flex flex-col gap-3">
                                        <input type="text" placeholder="Nama Tujuan (Cth: Beli Motor)" className="p-3 bg-white border border-slate-200 rounded-xl text-sm font-bold w-full outline-none focus:border-indigo-400" value={newGoalName} onChange={e => setNewGoalName(e.target.value)} />
                                        <input type="text" inputMode="numeric" placeholder="Target Nominal (Rp)" className="p-3 bg-white border border-slate-200 rounded-xl text-sm font-bold w-full outline-none focus:border-indigo-400" value={newGoalTarget ? Number(newGoalTarget).toLocaleString('id-ID') : ''} onChange={e => setNewGoalTarget(e.target.value.replace(/\D/g, ''))} />
                                        <div className="flex gap-2">
                                            <button onClick={() => { if(newGoalName && newGoalTarget) { setGoals([...goals, { id: Date.now(), name: newGoalName, target: Number(newGoalTarget), collapsed: false, assets: [] }]); setIsAddingGoal(false); setNewGoalName(''); setNewGoalTarget(''); }}} className="flex-1 bg-slate-800 text-white rounded-xl py-2.5 font-bold text-sm">Simpan</button>
                                            <button onClick={() => setIsAddingGoal(false)} className="flex-1 bg-slate-200 text-slate-700 rounded-xl py-2.5 font-bold text-sm">Batal</button>
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* Hutang Piutang Minimalist */}
                            <div>
                                <h4 className="text-xs font-bold text-slate-500 uppercase mb-3">Catatan Hutang / Piutang</h4>
                                <div className="space-y-3">
                                    {debts.map(debt => {
                                        const isDebt = debt.type === 'debt';
                                        const sisa = (Number(debt.total) || 0) - (Number(debt.paid) || 0);
                                        return (
                                            <div key={debt.id} className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center">
                                                <div>
                                                    <p className="font-bold text-sm text-slate-800">{debt.name}</p>
                                                    <p className="text-[10px] font-bold mt-0.5 text-slate-400">Sisa: <span className={isDebt ? 'text-rose-500' : 'text-emerald-500'}>{displayMoney(sisa)}</span></p>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => setViewingDebtId(debt.id)} className="px-3 py-1.5 bg-slate-50 text-slate-600 rounded-lg text-xs font-bold border border-slate-100">Detail</button>
                                                    <button onClick={() => setDebts(debts.filter(d => d.id !== debt.id))} className="px-2 py-1.5 bg-rose-50 text-rose-500 rounded-lg"><Trash2 className="w-3.5 h-3.5"/></button>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                                {!isAddingDebt ? (
                                    <button onClick={() => setIsAddingDebt(true)} className="w-full mt-3 py-3 bg-white border border-dashed border-slate-300 text-slate-600 rounded-xl font-bold text-sm flex items-center justify-center gap-2">
                                        <Plus className="w-4 h-4"/> Tambah Catatan Hutang/Piutang
                                    </button>
                                ) : (
                                    <div className="mt-3 bg-slate-50 p-4 rounded-2xl border border-slate-200 flex flex-col gap-3">
                                        <input type="text" placeholder="Nama Catatan" className="p-3 bg-white border border-slate-200 rounded-xl text-sm font-bold w-full" value={newDebt.name} onChange={e => setNewDebt({...newDebt, name: e.target.value})} />
                                        <div className="flex gap-2">
                                            <select className="flex-1 p-3 bg-white border border-slate-200 rounded-xl text-sm font-bold" value={newDebt.type} onChange={e => setNewDebt({...newDebt, type: e.target.value})}>
                                                <option value="debt">Hutang</option><option value="receivable">Piutang</option>
                                            </select>
                                            <input type="text" inputMode="numeric" placeholder="Total (Rp)" className="flex-1 p-3 bg-white border border-slate-200 rounded-xl text-sm font-bold" value={newDebt.total ? Number(newDebt.total).toLocaleString('id-ID') : ''} onChange={e => setNewDebt({...newDebt, total: e.target.value.replace(/\D/g, '')})} />
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => { if(newDebt.name && newDebt.total) { setDebts([...debts, { id: Date.now(), name: newDebt.name, total: Number(newDebt.total), paid: 0, type: newDebt.type }]); setIsAddingDebt(false); setNewDebt({name:'', total:'', type:'debt'}); }}} className="flex-1 bg-slate-800 text-white rounded-xl py-2.5 font-bold text-sm">Simpan</button>
                                            <button onClick={() => setIsAddingDebt(false)} className="flex-1 bg-slate-200 text-slate-700 rounded-xl py-2.5 font-bold text-sm">Batal</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );

            const renderProfile = () => (
                <div className="space-y-4 animate-in">
                    
                    <div className="flex bg-slate-100 p-1 rounded-xl w-full mb-2">
                        <button onClick={() => setProfileTab('networth')} className={`flex-1 py-2 text-xs font-bold rounded-lg transition-colors ${profileTab === 'networth' ? 'bg-white shadow-sm text-slate-800' : 'text-slate-500'}`}>Dompet & Aset</button>
                        <button onClick={() => setProfileTab('settings')} className={`flex-1 py-2 text-xs font-bold rounded-lg transition-colors ${profileTab === 'settings' ? 'bg-white shadow-sm text-slate-800' : 'text-slate-500'}`}>Pengaturan Data</button>
                    </div>

                    {profileTab === 'networth' && (
                        <div className="space-y-4 animate-in">
                            <div className="bg-slate-900 text-white p-5 rounded-2xl text-center">
                                <p className="text-xs text-slate-400 font-medium mb-1">Total Kekayaan Bersih</p>
                                <h2 className="text-3xl font-black">{displayMoney(totalNetWorth)}</h2>
                            </div>

                            <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-4">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-sm font-bold text-slate-800">Dompet / Rekening Utama</h3>
                                </div>
                                <div className="space-y-3">
                                    {assets.map(asset => (
                                        <div key={asset.id} className="flex justify-between items-center border-b border-slate-50 pb-3 last:border-0 last:pb-0">
                                            {editingAssetId === asset.id ? (
                                                <div className="flex flex-col gap-2 w-full mt-1">
                                                    <input type="text" className="p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-xs font-bold w-full outline-none focus:border-indigo-400" value={tempAsset.name} onChange={e => setTempAsset({...tempAsset, name: e.target.value})} placeholder="Nama Dompet" />
                                                    <div className="flex gap-2">
                                                        <input type="text" inputMode="numeric" className="flex-1 p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-xs font-bold outline-none focus:border-indigo-400" value={asset.unit === 'IDR' && tempAsset.quantity ? Number(tempAsset.quantity).toLocaleString('id-ID') : tempAsset.quantity} onChange={e => { let val = e.target.value; if (asset.unit === 'IDR') val = val.replace(/\D/g, ''); setTempAsset({...tempAsset, quantity: val}); }} placeholder="Saldo Baru" />
                                                        <button onClick={() => {
                                                            setAssets(assets.map(a => a.id === asset.id ? { ...a, name: tempAsset.name, quantity: Number(tempAsset.quantity) } : a));
                                                            setEditingAssetId(null);
                                                        }} className="px-4 py-2 bg-emerald-500 text-white rounded-lg text-xs font-bold shrink-0">Simpan</button>
                                                        <button onClick={() => setEditingAssetId(null)} className="px-3 py-2 bg-slate-200 text-slate-700 rounded-lg text-xs font-bold shrink-0">Batal</button>
                                                    </div>
                                                </div>
                                            ) : (
                                                <div className="flex justify-between items-center w-full">
                                                    <div>
                                                        <p className="font-bold text-sm text-slate-800">{asset.name}</p>
                                                        <p className="text-[10px] text-slate-500">{asset.category}</p>
                                                    </div>
                                                    <div className="flex items-center gap-1.5">
                                                        <div className="text-right mr-2">
                                                            <p className="font-bold text-sm text-emerald-600">{displayMoney(getAssetValueInIDR(asset))}</p>
                                                            {asset.unit !== 'IDR' && <p className="text-[9px] text-slate-400">{asset.quantity !== undefined ? asset.quantity : asset.amount} {asset.unit}</p>}
                                                        </div>
                                                        <button onClick={() => { setEditingAssetId(asset.id); setTempAsset({ name: asset.name, quantity: String(asset.quantity !== undefined ? asset.quantity : (asset.amount || 0)) }); }} className="text-slate-400 hover:text-indigo-500 p-1"><PencilSimple className="w-4 h-4"/></button>
                                                        <button onClick={() => setAssets(assets.filter(a => a.id !== asset.id))} className="text-rose-400 p-1"><Trash2 className="w-4 h-4"/></button>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                                
                                {!isAddingAsset ? (
                                    <button onClick={() => setIsAddingAsset(true)} className="w-full mt-4 py-2.5 bg-slate-50 border border-slate-200 text-slate-600 rounded-xl font-bold text-xs flex items-center justify-center gap-1.5">
                                        <Plus className="w-3.5 h-3.5"/> Tambah Dompet / Rekening
                                    </button>
                                ) : (
                                    <div className="mt-4 bg-slate-50 p-3 rounded-xl border border-slate-200 flex flex-col gap-2">
                                        <input type="text" placeholder="Nama Dompet / Bank" className="p-2.5 bg-white border border-slate-200 rounded-lg text-xs font-bold w-full" value={newAsset.name} onChange={e => setNewAsset({...newAsset, name: e.target.value})}/>
                                        <div className="flex gap-2">
                                            <select className="p-2.5 bg-white border border-slate-200 rounded-lg text-xs font-bold w-1/3" value={newAsset.unit} onChange={e => setNewAsset({...newAsset, unit: e.target.value})}>
                                                {UNITS.map(u => <option key={u} value={u}>{u}</option>)}
                                            </select>
                                            <input type="text" inputMode="numeric" placeholder="Saldo Saat Ini" className="p-2.5 bg-white border border-slate-200 rounded-lg text-xs font-bold w-2/3" value={newAsset.unit === 'IDR' && newAsset.quantity ? Number(newAsset.quantity).toLocaleString('id-ID') : newAsset.quantity} onChange={e => { let val = e.target.value; if (newAsset.unit === 'IDR') val = val.replace(/\D/g, ''); setNewAsset({...newAsset, quantity: val}); }}/>
                                        </div>
                                        <div className="flex gap-2 mt-1">
                                            <button onClick={() => { if(newAsset.name && newAsset.quantity) { setAssets([...assets, { ...newAsset, id: Date.now(), quantity: Number(newAsset.quantity) }]); setIsAddingAsset(false); setNewAsset({name:'', category:'Bank Cash', unit:'IDR', quantity:''}); }}} className="flex-1 bg-emerald-600 text-white rounded-lg py-2 font-bold text-xs">Simpan</button>
                                            <button onClick={() => setIsAddingAsset(false)} className="flex-1 bg-slate-200 text-slate-700 rounded-lg py-2 font-bold text-xs">Batal</button>
                                        </div>
                                    </div>
                                )}
                            </div>

                            <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-4 flex justify-between items-center">
                                <div>
                                    <p className="font-bold text-sm text-slate-800">Status Akun Cloud</p>
                                    <p className="text-[10px] text-emerald-500 font-bold">{cloudSyncStatus}</p>
                                </div>
                                {user && !user.isAnonymous ? (
                                    <button onClick={handleLogout} className="text-xs font-bold text-rose-500 bg-rose-50 px-3 py-1.5 rounded-lg">Logout</button>
                                ) : (
                                    <button onClick={handleGoogleLogin} className="text-xs font-bold text-blue-600 bg-blue-50 px-3 py-1.5 rounded-lg">Login Google</button>
                                )}
                            </div>
                        </div>
                    )}

                    {profileTab === 'settings' && (
                        <div className="space-y-4 animate-in">
                            {/* KATEGORI PENGATURAN */}
                            <div className="bg-white border border-slate-100 p-4 rounded-2xl shadow-sm">
                                <h3 className="text-sm font-bold text-slate-800 mb-4 flex items-center gap-2"><Tags className="w-4 h-4 text-indigo-500"/> Atur Kategori Cashflow</h3>
                                <div className="space-y-4">
                                    {Object.entries(categories).map(([type, list]) => (
                                        <div key={type}>
                                            <h4 className="text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-2">{type}</h4>
                                            <div className="flex flex-wrap gap-1.5">
                                                {list.map(cat => (
                                                    <div key={cat} className="flex items-center gap-1 bg-slate-50 border border-slate-200 px-2 py-1 rounded-md text-xs">
                                                        <span className="font-bold text-slate-700">{cat}</span>
                                                        <button onClick={() => setCategories({...categories, [type]: categories[type].filter(c => c !== cat)})} className="text-slate-400 hover:text-rose-500"><X className="w-3 h-3"/></button>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                
                                {!isAddingCategory ? (
                                    <button onClick={() => setIsAddingCategory(true)} className="w-full mt-4 py-2.5 border border-dashed border-indigo-200 text-indigo-600 bg-indigo-50/50 rounded-xl font-bold text-xs flex justify-center items-center gap-1.5 hover:bg-indigo-50 transition">
                                        <Plus className="w-3.5 h-3.5"/> Tambah Kategori
                                    </button>
                                ) : (
                                    <div className="mt-3 flex flex-col gap-2 bg-slate-50 p-3 rounded-xl border border-slate-200">
                                        <select className="p-2 bg-white border border-slate-200 rounded-lg text-xs font-bold w-full" value={newCatType} onChange={e => setNewCatType(e.target.value)}>
                                            <option value="income">Income (Pemasukan)</option><option value="spending">Spending (Pengeluaran)</option>
                                            <option value="bills">Bills (Tagihan)</option><option value="savings">Savings (Tabungan)</option><option value="debt">Debt (Cicilan)</option>
                                        </select>
                                        <input type="text" placeholder="Nama Kategori Baru" className="p-2 bg-white border border-slate-200 rounded-lg text-xs font-bold w-full" value={newCatName} onChange={e => setNewCatName(e.target.value)}/>
                                        <div className="flex gap-2 mt-1">
                                            <button onClick={() => { if(newCatName) { setCategories({...categories, [newCatType]: [...categories[newCatType], newCatName]}); setNewCatName(''); setIsAddingCategory(false); }}} className="flex-1 bg-indigo-600 text-white rounded-lg py-2 font-bold text-xs">Simpan</button>
                                            <button onClick={() => { setIsAddingCategory(false); setNewCatName(''); }} className="flex-1 bg-slate-200 text-slate-700 rounded-lg py-2 font-bold text-xs">Batal</button>
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* VALAS & EMAS PENGATURAN */}
                            <div className="bg-white border border-slate-100 p-4 rounded-2xl shadow-sm space-y-5">
                                <div>
                                    <div className="flex justify-between items-center mb-3">
                                        <h3 className="text-sm font-bold text-slate-800 flex items-center gap-2"><Globe className="w-4 h-4 text-emerald-500"/> Live Kurs Valas</h3>
                                        <button onClick={fetchLiveRates} disabled={isFetchingRates} className="bg-slate-900 text-white px-3 py-1.5 rounded-lg text-[10px] font-bold flex items-center gap-1.5">
                                            {isFetchingRates ? <Loader2 className="w-3 h-3 animate-spin" /> : <Globe className="w-3 h-3" />} Sync Valas
                                        </button>
                                    </div>
                                    <div className="grid grid-cols-3 gap-2">
                                        {['USD', 'SGD', 'EUR'].map(currency => (
                                            <div key={currency} className="bg-slate-50 border border-slate-100 rounded-lg p-2 text-center">
                                                <p className="text-[9px] font-bold text-slate-500">{currency}</p>
                                                <p className="font-black text-slate-800 text-xs mt-0.5">{rates[currency] ? Math.round(rates[currency]).toLocaleString('id-ID') : 0}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                
                                <div className="border-t border-slate-100 pt-4">
                                    <h3 className="text-sm font-bold text-slate-800 mb-3 flex items-center gap-2"><Coins className="w-4 h-4 text-amber-500"/> Harga Emas Manual (IDR)</h3>
                                    <div className="space-y-2">
                                        <div className="flex justify-between items-center bg-slate-50 p-2 rounded-lg border border-slate-100">
                                            <label className="text-xs font-bold text-slate-600">Emas Antam /g</label>
                                            <input type="text" className="w-24 text-right bg-white border border-slate-200 rounded-md px-2 py-1 text-xs font-bold" value={(rates['Emas Antam (g)'] || 0).toLocaleString('id-ID')} onChange={(e) => handleRateChange('Emas Antam (g)', e.target.value)} />
                                        </div>
                                        <div className="flex justify-between items-center bg-slate-50 p-2 rounded-lg border border-slate-100">
                                            <label className="text-xs font-bold text-slate-600">Emas G24 /g</label>
                                            <input type="text" className="w-24 text-right bg-white border border-slate-200 rounded-md px-2 py-1 text-xs font-bold" value={(rates['Emas G24 (g)'] || 0).toLocaleString('id-ID')} onChange={(e) => handleRateChange('Emas G24 (g)', e.target.value)} />
                                        </div>
                                        <div className="flex justify-between items-center bg-slate-50 p-2 rounded-lg border border-slate-100">
                                            <label className="text-xs font-bold text-slate-600">Dinar KR</label>
                                            <input type="text" className="w-24 text-right bg-white border border-slate-200 rounded-md px-2 py-1 text-xs font-bold" value={(rates['Dinar KR'] || 0).toLocaleString('id-ID')} onChange={(e) => handleRateChange('Dinar KR', e.target.value)} />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col pb-20">
                    <header className="bg-white px-5 py-4 flex justify-between items-center sticky top-0 z-40 border-b border-slate-100">
                        <div className="flex items-center gap-2">
                            <div className="bg-slate-900 w-8 h-8 rounded-lg flex items-center justify-center">
                                <Wallet className="text-white w-4 h-4" />
                            </div>
                            <h1 className="text-lg font-black text-slate-900">Loka Planner</h1>
                        </div>
                        {(activeTab === 'dashboard' || activeTab === 'transactions') && (
                            <select value={selectedMonth} onChange={(e) => setSelectedMonth(e.target.value)} className="bg-slate-50 border border-slate-100 rounded-lg text-xs font-bold text-slate-700 py-1.5 px-2 outline-none">
                                <option value="all">Semua</option>
                                {['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Ags','Sep','Okt','Nov','Des'].map((m, i) => <option key={i} value={i + 1}>{m}</option>)}
                            </select>
                        )}
                    </header>

                    <main className="flex-1 p-4 max-w-lg mx-auto w-full relative">
                        {activeTab === 'dashboard' && renderDashboard()}
                        {activeTab === 'transactions' && renderTransactions()}
                        {activeTab === 'planner' && renderPlanner()}
                        {activeTab === 'profile' && renderProfile()}
                    </main>

                    <nav className="fixed bottom-0 left-0 w-full bg-white border-t border-slate-100 z-50 pb-safe">
                        <div className="max-w-lg mx-auto px-4 py-2 flex justify-between items-center">
                            <button onClick={() => handleTabChange('dashboard')} className={`flex flex-col items-center p-2 flex-1 ${activeTab === 'dashboard' ? 'text-slate-900' : 'text-slate-400'}`}>
                                <Home className="w-5 h-5 mb-1" /> <span className="text-[9px] font-bold">Home</span>
                            </button>
                            <button onClick={() => handleTabChange('transactions')} className={`flex flex-col items-center p-2 flex-1 ${activeTab === 'transactions' ? 'text-slate-900' : 'text-slate-400'}`}>
                                <ListOrdered className="w-5 h-5 mb-1" /> <span className="text-[9px] font-bold">Riwayat</span>
                            </button>
                            <div className="flex-1 flex justify-center -mt-6">
                                <button onClick={() => { triggerHaptic(15); setIsAddModalOpen(true); }} className="bg-emerald-500 text-white w-12 h-12 rounded-full shadow-lg flex items-center justify-center border-4 border-white active:scale-95 transition-transform">
                                    <Plus className="w-6 h-6" />
                                </button>
                            </div>
                            <button onClick={() => handleTabChange('planner')} className={`flex flex-col items-center p-2 flex-1 ${activeTab === 'planner' ? 'text-slate-900' : 'text-slate-400'}`}>
                                <PieChart className="w-5 h-5 mb-1" /> <span className="text-[9px] font-bold">Rencana</span>
                            </button>
                            <button onClick={() => handleTabChange('profile')} className={`flex flex-col items-center p-2 flex-1 ${activeTab === 'profile' ? 'text-slate-900' : 'text-slate-400'}`}>
                                <User className="w-5 h-5 mb-1" /> <span className="text-[9px] font-bold">Profil</span>
                            </button>
                        </div>
                    </nav>

                    {isAddModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/40 z-[60] flex items-end animate-in">
                            <TransactionForm 
                                initialData={editingTx} assets={assets} categories={categories}
                                onClose={() => { setIsAddModalOpen(false); setEditingTx(null); }} 
                                onSave={(newTx, editId) => { 
                                    triggerHaptic(20);
                                    let oldTx = editId ? transactions.find(t => t.id === editId) : null;

                                    setAssets(prevAssets => {
                                        let updated = [...prevAssets];
                                        // Revert old
                                        if (oldTx) {
                                            if (oldTx.type === 'transfer') {
                                                if (oldTx.walletId) updated = updated.map(a => String(a.id) === String(oldTx.walletId) ? { ...a, quantity: Number(a.quantity||0) + oldTx.amount } : a);
                                                if (oldTx.toWalletId) updated = updated.map(a => String(a.id) === String(oldTx.toWalletId) ? { ...a, quantity: Number(a.quantity||0) - oldTx.amount } : a);
                                            } else if (oldTx.walletId) {
                                                updated = updated.map(a => String(a.id) === String(oldTx.walletId) ? { ...a, quantity: Number(a.quantity||0) + (['income'].includes(oldTx.type) ? -oldTx.amount : oldTx.amount) } : a);
                                            }
                                        }
                                        // Apply new
                                        if (newTx.type === 'transfer') {
                                            if (newTx.walletId) updated = updated.map(a => String(a.id) === String(newTx.walletId) ? { ...a, quantity: Number(a.quantity||0) - newTx.amount } : a);
                                            if (newTx.toWalletId) updated = updated.map(a => String(a.id) === String(newTx.toWalletId) ? { ...a, quantity: Number(a.quantity||0) + newTx.amount } : a);
                                        } else if (newTx.walletId) {
                                            updated = updated.map(a => String(a.id) === String(newTx.walletId) ? { ...a, quantity: Number(a.quantity||0) + (['income'].includes(newTx.type) ? newTx.amount : -newTx.amount) } : a);
                                        }
                                        return updated;
                                    });

                                    setTransactions(prev => editId ? prev.map(t => t.id === editId ? { ...newTx, id: editId } : t) : [{ ...newTx, id: Date.now() }, ...prev]); 
                                    setIsAddModalOpen(false); setEditingTx(null);
                                }} 
                            />
                        </div>
                    )}
                    
                    {/* View/Edit Detail Hutang */}
                    {viewingDebtId && (() => {
                        const debt = debts.find(d => d.id === viewingDebtId);
                        if (!debt) return null;
                        const isDebt = debt.type === 'debt';
                        const sisa = (Number(debt.total) || 0) - (Number(debt.paid) || 0);
                        
                        return (
                            <div className="fixed inset-0 bg-white z-[70] flex flex-col animate-in">
                                <header className="bg-white px-5 py-4 flex items-center border-b border-slate-100 shadow-sm">
                                    <button onClick={() => setViewingDebtId(null)} className="p-1 mr-3"><ArrowLeft className="w-5 h-5" /></button>
                                    <h2 className="font-bold text-sm truncate flex-1">{debt.name}</h2>
                                </header>
                                <div className="p-5 overflow-y-auto flex-1">
                                    <div className="bg-slate-50 rounded-2xl p-5 mb-5 text-center border border-slate-100">
                                        <p className="text-xs font-bold text-slate-500 mb-1">Sisa {isDebt ? 'Utang' : 'Piutang'}</p>
                                        <h3 className="text-3xl font-black text-slate-800">{displayMoney(sisa)}</h3>
                                    </div>
                                    <div className="space-y-4 mb-6">
                                        {(debt.history || []).map((h, i) => (
                                            <div key={i} className="flex justify-between items-center border-b border-slate-50 pb-3">
                                                <div>
                                                    <p className="font-bold text-sm text-slate-800">{h.note}</p>
                                                    <p className="text-[10px] text-slate-500">{h.date}</p>
                                                </div>
                                                <p className={`font-bold text-sm ${h.type === 'payment' ? 'text-emerald-500' : 'text-rose-500'}`}>
                                                    {h.type === 'payment' ? '+' : '-'}{displayMoney(h.amount)}
                                                </p>
                                            </div>
                                        ))}
                                    </div>
                                    
                                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                        <p className="font-bold text-sm mb-3">Catat Transaksi Baru</p>
                                        <input type="text" inputMode="numeric" placeholder="Nominal (Rp)" className="w-full p-3 mb-2 rounded-lg border border-slate-200 text-sm font-bold" value={debtTxForm.amount ? Number(debtTxForm.amount).toLocaleString('id-ID') : ''} onChange={e => setDebtTxForm({...debtTxForm, amount: e.target.value.replace(/\D/g,'')})} />
                                        <select className="w-full p-3 mb-3 rounded-lg border border-slate-200 text-sm font-bold" value={debtTxForm.type} onChange={e => setDebtTxForm({...debtTxForm, type: e.target.value})}>
                                            <option value="payment">Bayar Cicilan</option>
                                            <option value="increase">Tambah Nominal Pinjaman</option>
                                        </select>
                                        <button onClick={() => {
                                            if(!debtTxForm.amount) return;
                                            const amt = Number(debtTxForm.amount);
                                            const newTx = { id: Date.now(), date: new Date().toISOString().split('T')[0], type: debtTxForm.type, amount: amt, note: debtTxForm.type === 'payment' ? 'Pembayaran' : 'Penambahan' };
                                            setDebts(debts.map(d => d.id === viewingDebtId ? { ...d, total: debtTxForm.type === 'increase' ? d.total + amt : d.total, paid: debtTxForm.type === 'payment' ? d.paid + amt : d.paid, history: [newTx, ...(d.history||[])] } : d));
                                            setDebtTxForm({ type: 'payment', amount: '', date: new Date().toISOString().split('T')[0], note: '', sync: false, walletId: '' });
                                        }} className="w-full bg-slate-900 text-white p-3 rounded-lg font-bold text-sm">Simpan Riwayat</button>
                                    </div>
                                </div>
                            </div>
                        );
                    })()}

                    {/* View/Edit Detail Tabungan (Goal) */}
                    {viewingGoalId && (() => {
                        const goal = goals.find(g => g.id === viewingGoalId);
                        if (!goal) return null;
                        const goalTotal = (goal.assets || []).reduce((sum, a) => sum + getAssetValueInIDR(a), 0);
                        
                        return (
                            <div className="fixed inset-0 bg-white z-[70] flex flex-col animate-in">
                                <header className="bg-white px-5 py-4 flex items-center border-b border-slate-100 shadow-sm">
                                    <button onClick={() => setViewingGoalId(null)} className="p-1 mr-3"><ArrowLeft className="w-5 h-5" /></button>
                                    <input type="text" className="font-bold text-sm truncate flex-1 bg-transparent outline-none" value={goal.name} onChange={e => updateGoal(goal.id, 'name', e.target.value)} placeholder="Nama Tujuan" />
                                </header>
                                <div className="p-5 overflow-y-auto flex-1">
                                    <div className="bg-slate-50 rounded-2xl p-5 mb-5 text-center border border-slate-100">
                                        <p className="text-xs font-bold text-slate-500 mb-1">Terkumpul</p>
                                        <h3 className="text-3xl font-black text-emerald-500 mb-3">{displayMoney(goalTotal)}</h3>
                                        <div className="flex justify-center items-center gap-1.5 text-xs font-bold text-slate-600">
                                            <span>Target: Rp</span>
                                            <input type="text" inputMode="numeric" className="bg-transparent border-b border-dashed border-slate-300 w-24 text-center focus:border-emerald-500 outline-none" value={goal.target ? Number(goal.target).toLocaleString('id-ID') : ''} onChange={e => updateGoal(goal.id, 'target', e.target.value.replace(/\D/g, ''))} />
                                        </div>
                                    </div>
                                    
                                    <div className="space-y-3 mb-6">
                                        <h4 className="text-xs font-bold text-slate-500 uppercase">Daftar Sub-Aset</h4>
                                        {(goal.assets || []).length === 0 && <p className="text-xs text-slate-400 text-center py-4">Belum ada aset ditambahkan</p>}
                                        {(goal.assets || []).map(asset => {
                                            const equivIDR = getAssetValueInIDR(asset);
                                            return (
                                                <div key={asset.id} className="bg-white border border-slate-100 p-3 rounded-xl shadow-sm flex flex-col gap-2">
                                                    <div className="flex justify-between items-center">
                                                        <input type="text" placeholder="Nama Aset (Cth: Emas Antam)" className="font-bold text-xs bg-transparent outline-none w-full text-slate-800" value={asset.name} onChange={e => updateGoalAsset(goal.id, asset.id, 'name', e.target.value)} />
                                                        <button onClick={() => removeGoalAsset(goal.id, asset.id)} className="text-rose-400 p-1"><X className="w-3.5 h-3.5"/></button>
                                                    </div>
                                                    <div className="flex gap-2 items-center">
                                                        <select className="bg-slate-50 border border-slate-200 rounded-lg px-2 py-1.5 text-[10px] font-bold w-1/3 outline-none" value={asset.unit} onChange={e => updateGoalAsset(goal.id, asset.id, 'unit', e.target.value)}>
                                                            {UNITS.map(u => <option key={u} value={u}>{u}</option>)}
                                                        </select>
                                                        <input type={asset.unit==='IDR'?"text":"number"} placeholder="Nominal/Saldo" className="bg-slate-50 border border-slate-200 rounded-lg px-2 py-1.5 text-xs font-bold w-2/3 text-right outline-none focus:border-indigo-400" value={asset.unit==='IDR'?(asset.quantity?Number(asset.quantity).toLocaleString('id-ID'):''):asset.quantity} onChange={e => { let val=e.target.value; if(asset.unit==='IDR')val=val.replace(/\D/g,''); updateGoalAsset(goal.id, asset.id, 'quantity', val); }} />
                                                    </div>
                                                    {asset.unit !== 'IDR' && <p className="text-[10px] text-slate-400 text-right font-bold">≈ {displayMoney(equivIDR)}</p>}
                                                </div>
                                            );
                                        })}
                                    </div>
                                    
                                    <button onClick={() => addGoalAsset(goal.id)} className="w-full bg-slate-900 text-white p-3 rounded-xl font-bold text-sm flex justify-center items-center gap-2">
                                        <Plus className="w-4 h-4" /> Tambah Sub-Aset
                                    </button>
                                </div>
                            </div>
                        );
                    })()}
                </div>
            );
        }

        // Komponen Form Transaksi (Minimalist)
        function TransactionForm({ onClose, onSave, categories, initialData, assets }) {
            const { useState } = React;
            const [type, setType] = useState(initialData?.type || 'spending');
            const [amount, setAmount] = useState(initialData?.amount || '');
            const [date, setDate] = useState(initialData?.date || new Date().toISOString().split('T')[0]);
            const [category, setCategory] = useState(initialData?.category || (categories['spending']||[])[0] || '');
            const [description, setDescription] = useState(initialData?.description || '');
            const [walletId, setWalletId] = useState(initialData?.walletId || (assets[0]?.id || ''));
            const [toWalletId, setToWalletId] = useState(initialData?.toWalletId || (assets[1]?.id || assets[0]?.id || ''));

            const TYPE_OPT = [
                {id:'spending', l:'Pengeluaran'}, 
                {id:'income', l:'Pemasukan'}, 
                {id:'bills', l:'Tagihan'}, 
                {id:'savings', l:'Tabungan'},
