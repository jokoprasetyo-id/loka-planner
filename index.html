                {id:'debt', l:'Cicilan'}, 
                {id:'transfer', l:'Transfer'}
            ];

            return (
                <div className="bg-white w-full rounded-t-3xl shadow-2xl p-5 mt-auto max-h-[90vh] overflow-y-auto">
                    <div className="flex justify-between items-center mb-5 border-b border-slate-100 pb-3">
                        <h3 className="text-lg font-bold text-slate-800">{initialData ? 'Edit' : 'Catat'} Transaksi</h3>
                        <button onClick={onClose} className="p-1"><X className="w-5 h-5" /></button>
                    </div>
                    <form onSubmit={e => { e.preventDefault(); if(amount && description && !(type === 'transfer' && walletId === toWalletId)) onSave({ type, amount: Number(amount), date, category: type==='transfer'?'Transfer':category, description, walletId, toWalletId }, initialData?.id); }} className="space-y-4">
                        <div className="grid grid-cols-3 gap-2">
                            {TYPE_OPT.map(o => (
                                <button key={o.id} type="button" onClick={() => { setType(o.id); if(o.id !== 'transfer') setCategory(categories[o.id]?.[0] || ''); }} className={`py-2 rounded-lg text-[11px] font-bold border transition ${type === o.id ? 'bg-slate-900 text-white border-slate-900' : 'bg-white text-slate-500 border-slate-200'}`}>{o.l}</button>
                            ))}
                        </div>
                        <input type="text" inputMode="numeric" required placeholder="Nominal (Rp)" value={amount ? Number(amount).toLocaleString('id-ID') : ''} onChange={e => setAmount(e.target.value.replace(/\D/g, ''))} className="w-full p-4 bg-slate-50 rounded-xl text-xl font-black focus:outline-none focus:ring-2 focus:ring-slate-300" />
                        <div className="grid grid-cols-2 gap-3">
                            <input type="date" required value={date} onChange={e => setDate(e.target.value)} className="w-full p-3 bg-slate-50 rounded-xl text-sm font-bold focus:outline-none" />
                            {type !== 'transfer' && <select value={category} onChange={e => setCategory(e.target.value)} className="w-full p-3 bg-slate-50 rounded-xl text-sm font-bold focus:outline-none">{(categories[type] || []).map(c => <option key={c} value={c}>{c}</option>)}</select>}
                        </div>
                        {type === 'transfer' ? (
                            <div className="grid grid-cols-2 gap-3">
                                <select value={walletId} onChange={e => setWalletId(e.target.value)} className="w-full p-3 bg-slate-50 rounded-xl text-sm font-bold"><option value="">Dari...</option>{assets.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}</select>
                                <select value={toWalletId} onChange={e => setToWalletId(e.target.value)} className="w-full p-3 bg-slate-50 rounded-xl text-sm font-bold"><option value="">Ke...</option>{assets.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}</select>
                            </div>
                        ) : (
                            <select value={walletId} onChange={e => setWalletId(e.target.value)} className="w-full p-3 bg-slate-50 rounded-xl text-sm font-bold"><option value="">-- Abaikan Saldo / Pilih Rekening --</option>{assets.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}</select>
                        )}
                        <input type="text" required placeholder="Keterangan..." value={description} onChange={e => setDescription(e.target.value)} className="w-full p-3 bg-slate-50 rounded-xl text-sm font-bold focus:outline-none" />
                        <button type="submit" className="w-full bg-emerald-500 text-white font-bold text-base py-3.5 rounded-xl mt-2">Simpan Cashflow</button>
                    </form>
                </div>
            );
        }

        const initApp = () => {
            initFirebase();
            const rootElement = document.getElementById('root');
            if (rootElement && !rootElement.hasChildNodes()) {
                const root = ReactDOM.createRoot(rootElement);
                root.render(<App />);
            }
        };

        if (window.FB) { initApp(); } 
        else { window.addEventListener('firebase-modules-loaded', initApp); setTimeout(initApp, 1000); }
    </script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                if (window.location.protocol === 'http:' || window.location.protocol === 'https:') {
                    navigator.serviceWorker.register('./sw.js').catch(() => {});
                }
            });
        }
    </script>
</body>
</html>
